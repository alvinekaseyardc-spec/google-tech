services:
  - type: web
    name: google-tech
    env: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p 8000 googleTech.asgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: googleTech.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: google-tech-db
          property: connectionString
      - key: ENSEIGNANT_SECRET_CODE
        value: votre_code_secret

databases:
  - name: google-tech-db
    databaseName: googletech
    user: googletech