services:
  - type: web
    name: google-tech
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne -b 0.0.0.0 -p $PORT googleTech.asgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: googleTech.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: google-tech-db
          property: connectionString
      - key: ENSEIGNANT_SECRET_CODE
        value: votre_code_secret_ici
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: DEFAULT_FROM_EMAIL
        value: noreply@google-tech.com

# ============================
#  Base de données PostgreSQL
# ============================
databases:
  - name: google-tech-db
    databaseName: googletech
    user: googletech
